name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.skill_bundle_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            skill_bundle_name: doc-maintenance-skill-linux-x64.tar.gz
            extension: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            skill_bundle_name: doc-maintenance-skill-macos-x64.tar.gz
            extension: ""
          - os: macos-14
            target: aarch64-apple-darwin
            skill_bundle_name: doc-maintenance-skill-macos-arm64.tar.gz
            extension: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            skill_bundle_name: doc-maintenance-skill-windows-x64.zip
            extension: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          binary_path="target/${{ matrix.target }}/release/maintenance${{ matrix.extension }}"
          bundle_root="bundle-root/doc-maintenance"
          mkdir -p "$bundle_root/bin"
          cp "skill/doc-maintenance/SKILL.md" "$bundle_root/SKILL.md"
          cp "$binary_path" "$bundle_root/bin/maintenance${{ matrix.extension }}"
          if [[ "${{ matrix.skill_bundle_name }}" == *.zip ]]; then
            (cd bundle-root && pwsh -NoProfile -Command "Compress-Archive -Path 'doc-maintenance' -DestinationPath '../dist/${{ matrix.skill_bundle_name }}' -Force")
          else
            tar -czf "dist/${{ matrix.skill_bundle_name }}" -C bundle-root doc-maintenance
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.skill_bundle_name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --title "$TAG_NAME" \
              --notes "Doc Maintenance skill bundles for Windows x64, macOS x64, macOS arm64, and Linux x64."
          fi
